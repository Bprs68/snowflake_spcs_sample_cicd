name: Deploy to Snowflake

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs

      - name: Login to Snowflake Container Registry
        run: |
          echo "${{ secrets.SNOWFLAKE_PASSWORD }}" | docker login ${{ secrets.SNOWFLAKE_REGISTRY_URL }} \
          -u "${{ secrets.SNOWFLAKE_USER }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t app:latest .

      - name: Tag Image
        run: |
          docker tag app:latest ${{ secrets.SNOWFLAKE_REGISTRY_URL }}/demo_db/public/my_repo/app:latest

      - name: Push Image
        run: |
          docker push ${{ secrets.SNOWFLAKE_REGISTRY_URL }}/demo_db/public/my_repo/app:latest

      - name: Generate deploy SQL
        run: |
          cat > deploy.sql << 'EOF'
          ALTER SERVICE demo_db.public.my_service SET SPECIFICATION = $$
          spec:
            containers:
              - name: app
                image: ${SNOWFLAKE_REGISTRY_URL}/demo_db/public/my_repo/app:latest
            endpoints:
              - name: app
                port: 8080
          $$;
          EOF
        env:
          SNOWFLAKE_REGISTRY_URL: ${{ secrets.SNOWFLAKE_REGISTRY_URL }}

      - name: Deploy Snowflake Service
        run: |
          snow sql \
            --temporary-connection \
            --account $SNOWFLAKE_ACCOUNT \
            --user $SNOWFLAKE_USER \
            --role $SNOWFLAKE_ROLE \
            -f deploy.sql
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}