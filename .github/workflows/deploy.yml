name: Deploy to Snowflake

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install SnowSQL
      run: |
        curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-1.2.32-linux_x86_64.bash
        bash snowsql-1.2.32-linux_x86_64.bash

    - name: Login to Snowflake Container Registry
      run: |
        echo "${{ secrets.SNOWFLAKE_PASSWORD }}" | docker login ${{ secrets.SNOWFLAKE_REGISTRY_URL }} \
        -u "${{ secrets.SNOWFLAKE_USER }}" --password-stdin

    - name: Build Docker Image
      run: |
        docker build -t app:latest .

    - name: Tag Image
      run: |
        docker tag app:latest ${{ secrets.SNOWFLAKE_REGISTRY_URL }}/my_repo/app:latest

    - name: Push Image
      run: |
        docker push ${{ secrets.SNOWFLAKE_REGISTRY_URL }}/my_repo/app:latest

    - name: Deploy to Snowflake Service
      run: |
        snowsql -a ${{ secrets.SNOWFLAKE_ACCOUNT }} \
        -u ${{ secrets.SNOWFLAKE_USER }} \
        -p ${{ secrets.SNOWFLAKE_PASSWORD }} \
        -r ${{ secrets.SNOWFLAKE_ROLE }} \
        -q "ALTER SERVICE my_service SET IMAGE='${{ secrets.SNOWFLAKE_REGISTRY_URL }}/my_repo/app:latest';"