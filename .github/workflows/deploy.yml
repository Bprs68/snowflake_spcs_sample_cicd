name: Deploy to Snowflake

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs

      - name: Login to Snowflake Container Registry
        run: |
          echo "${{ secrets.SNOWFLAKE_PASSWORD }}" | docker login ${{ secrets.SNOWFLAKE_REGISTRY_URL }} \
          -u "${{ secrets.SNOWFLAKE_USER }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t app:latest .

      - name: Tag Image
        run: |
          docker tag app:latest ${{ secrets.SNOWFLAKE_REGISTRY_URL }}/demo_db/public/my_repo/app:latest

      - name: Push Image
        run: |
          docker push ${{ secrets.SNOWFLAKE_REGISTRY_URL }}/demo_db/public/my_repo/app:latest

      - name: Generate deploy SQL
        run: |
          cat > deploy.sql << EOF
          DROP SERVICE IF EXISTS demo_db.public.my_service;
          CREATE SERVICE demo_db.public.my_service
            IN COMPUTE POOL my_pool
            FROM SPECIFICATION \$\$
          spec:
            containers:
              - name: app
                image: /demo_db/public/my_repo/app:latest
            endpoints:
              - name: app
                port: 8080
                public: true
          \$\$;
          EOF

      - name: Deploy Snowflake Service
        run: |
          snow sql \
            --temporary-connection \
            --account $SNOWFLAKE_ACCOUNT \
            --user $SNOWFLAKE_USER \
            --password $SNOWFLAKE_PASSWORD \
            --role $SNOWFLAKE_ROLE \
            -f deploy.sql
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}

